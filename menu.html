<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Qaysar Restaurant – Today's Menu</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0ede8; min-height: 100vh; }

  .header { padding: 28px 20px 16px; text-align: center; border-bottom: 1px solid #2a2a2a; }
  .logo-circle { width: 64px; height: 64px; border-radius: 50%; background: #c8a96e; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; font-weight: 700; color: #0f0f0f; }
  .header h1 { font-size: 22px; font-weight: 700; color: #f0ede8; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: #888; margin-top: 4px; }
  .header .date-badge { display: inline-block; margin-top: 10px; font-size: 11px; background: #1e1e1e; border: 1px solid #333; color: #aaa; padding: 4px 14px; border-radius: 20px; }
  .header .open-badge { display: inline-block; margin-top: 6px; font-size: 11px; background: #0f2d1a; border: 1px solid #1a5c30; color: #4caf82; padding: 4px 14px; border-radius: 20px; margin-left: 6px; }

  .section-tab-row { display: flex; gap: 8px; padding: 14px 16px 6px; overflow-x: auto; scrollbar-width: none; }
  .section-tab-row::-webkit-scrollbar { display: none; }
  .section-tab { flex-shrink: 0; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; background: #1e1e1e; border: 1px solid #333; color: #aaa; cursor: pointer; white-space: nowrap; }
  .section-tab.active { background: #c8a96e; border-color: #c8a96e; color: #0f0f0f; }

  .content { padding: 8px 0 60px; }
  .section-block { display: none; }
  .section-block.active { display: block; }

  .section-title { font-size: 11px; font-weight: 600; color: #666; letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 16px 8px; }
  .dish-card { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid #1e1e1e; gap: 12px; }
  .dish-card:last-child { border-bottom: none; }
  .dish-left { flex: 1; }
  .dish-en { font-size: 14px; font-weight: 500; color: #f0ede8; }
  .dish-ar { font-size: 12px; color: #666; margin-top: 2px; direction: rtl; text-align: left; }
  .dish-price { font-size: 14px; font-weight: 600; color: #c8a96e; white-space: nowrap; }
  .price-na { font-size: 11px; color: #555; }

  .empty-state { text-align: center; padding: 60px 32px; }
  .empty-state h2 { font-size: 18px; color: #555; font-weight: 500; }
  .empty-state p { font-size: 13px; color: #444; margin-top: 8px; }

  .loading { text-align: center; padding: 80px 32px; color: #555; font-size: 14px; }

  .footer { text-align: center; padding: 20px 20px 36px; border-top: 1px solid #1e1e1e; }
  .footer p { font-size: 12px; color: #555; line-height: 1.8; }
  .footer a { color: #c8a96e; text-decoration: none; }

  .updated-bar { text-align: center; font-size: 11px; color: #444; padding: 6px 16px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-circle">AQ</div>
  <h1>Al Qaysar Restaurant</h1>
  <p>مطعم القيصر للمأكولات العربية</p>
  <div>
    <span class="date-badge" id="today-date"></span>
    <span class="open-badge">Open 24 Hours</span>
  </div>
</div>

<div id="section-tabs" class="section-tab-row"></div>
<div class="updated-bar" id="updated-bar"></div>

<div class="content" id="content">
  <div class="loading">Loading today's menu...</div>
</div>

<div class="footer">
  <p>
    King Abdullah, Duba 49315<br>
    <a href="tel:+966565041261">+966 565 041 261</a> &nbsp;·&nbsp;
    <a href="mailto:alqaysarcatering@gmail.com">alqaysarcatering@gmail.com</a>
  </p>
</div>

<script>
// ==========================================
// FIREBASE CONFIG — SAME AS STAFF.HTML
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyCxvxgkzALj5Mip7GHAJBK9SYnNm9qO0KI",
  authDomain: "alqaysar-menu.firebaseapp.com",
  databaseURL: "https://alqaysar-menu-default-rtdb.firebaseio.com",
  projectId: "alqaysar-menu",
  storageBucket: "alqaysar-menu.firebasestorage.app",
  messagingSenderId: "181160036262",
  appId: "1:181160036262:web:d26f2d2504b880807bb167",
  measurementId: "G-3ZTYG4EHMT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
// ==========================================

const SECTION_ORDER = [
  "Appetizers","Eidam (Stews)","Grills","Chinese","Sea Food",
  "Saudi Food","Meat","Rice","Karahi Station","BBQ",
  "Pakistani Food","Afghani Food","Salads","Burgers & Sandwiches",
  "Naan & Roti","Beverages","Sweets & Desserts"
];

// Set today's date
const d = new Date();
document.getElementById('today-date').textContent = d.toLocaleDateString('en-SA', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// Listen for real-time updates
db.ref('menu').on('value', snap => {
  const data = snap.val();
  if (!data || !data.dishes) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>Menu not available yet</h2>
        <p>Please check back shortly or ask our staff.</p>
      </div>`;
    document.getElementById('section-tabs').innerHTML = '';
    return;
  }

  // Updated time
  if (data.updatedAt) {
    const t = new Date(data.updatedAt);
    document.getElementById('updated-bar').textContent = 'Last updated: ' + t.toLocaleTimeString('en-SA', { hour:'2-digit', minute:'2-digit' });
  }

  // Group dishes by section
  const groups = {};
  Object.values(data.dishes).forEach(dish => {
    if (!groups[dish.section]) groups[dish.section] = [];
    groups[dish.section].push(dish);
  });

  const sections = SECTION_ORDER.filter(s => groups[s]);

  if (!sections.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>No dishes available right now</h2>
        <p>We are updating the menu. Please check back soon.</p>
      </div>`;
    document.getElementById('section-tabs').innerHTML = '';
    return;
  }

  // Build tabs
  const tabRow = document.getElementById('section-tabs');
  tabRow.innerHTML = sections.map((s, i) =>
    `<div class="section-tab ${i===0?'active':''}" onclick="showSection('${s}', this)">${s}</div>`
  ).join('');

  // Build content blocks
  const content = document.getElementById('content');
  content.innerHTML = sections.map((section, i) => `
    <div class="section-block ${i===0?'active':''}" id="sec-${section.replace(/\s+/g,'_').replace(/[()&\/]/g,'')}">
      <div class="section-title">${section}</div>
      ${groups[section].map(d => `
        <div class="dish-card">
          <div class="dish-left">
            <div class="dish-en">${d.en}</div>
            <div class="dish-ar">${d.ar}</div>
          </div>
          <div class="dish-price">${d.price ? d.price + ' <span style="font-size:10px;font-weight:400;">ر.س</span>' : '<span class="price-na">Ask staff</span>'}</div>
        </div>`).join('')}
    </div>`).join('');
});

function showSection(name, el) {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section-block').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const id = 'sec-' + name.replace(/\s+/g,'_').replace(/[()&\/]/g,'');
  const block = document.getElementById(id);
  if (block) block.classList.add('active');
  el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}
</script>
</body>
</html>
