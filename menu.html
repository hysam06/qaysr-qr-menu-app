<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Qaysar Restaurant – Menu</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #1a1a1a;
    min-height: 100vh;
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── TOP NAV ── */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    background: #DC143C;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .nav-logo-icon { font-size: 22px; line-height: 1; }
  .nav-logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: #FFD700;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .nav-logo-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .nav-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }
  .nav-menu-btn span {
    display: block;
    width: 22px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, #fff9f0 0%, #fff3e0 60%, #ffe8cc 100%);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid #FFD700;
  }
  .hero-welcome {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #DC143C;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .hero-welcome::before,
  .hero-welcome::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: #DC143C;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hero-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 12px 0;
  }
  .hero-divider::before,
  .hero-divider::after {
    content: '';
    display: block;
    width: 48px;
    height: 1px;
    background: #FFD700;
  }
  .hero-divider-icon { color: #DC143C; font-size: 16px; }
  .hero-subtitle {
    font-size: 13px;
    color: #666;
    line-height: 1.7;
    max-width: 280px;
    margin: 0 auto 20px;
  }
  .hero-search {
    position: relative;
    max-width: 340px;
    margin: 0 auto;
  }
  .hero-search input {
    width: 100%;
    padding: 13px 18px 13px 44px;
    border: 2px solid #FFD700;
    border-radius: 50px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: #fff;
    outline: none;
    color: #1a1a1a;
    box-shadow: 0 2px 12px rgba(220,20,60,0.08);
  }
  .hero-search input:focus { border-color: #DC143C; }
  .hero-search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #DC143C;
    font-size: 16px;
  }

  /* ── CATEGORY ICONS ── */
  .category-bar {
    background: #fff;
    padding: 20px 16px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .category-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .category-scroll::-webkit-scrollbar { display: none; }
  .cat-item {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 0 10px 14px;
    border-bottom: 3px solid transparent;
    transition: all 0.25s;
    min-width: 64px;
  }
  .cat-item.active { border-bottom-color: #DC143C; }
  .cat-icon-wrap {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #f8f8f8;
    border: 2px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.25s;
  }
  .cat-item.active .cat-icon-wrap {
    background: #DC143C;
    border-color: #DC143C;
  }
  .cat-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-align: center;
    white-space: nowrap;
  }
  .cat-item.active .cat-label { color: #DC143C; font-weight: 700; }

  /* ── MENU BODY ── */
  .menu-body { padding: 0 0 100px; background: #fff; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 20px 10px;
  }
  .section-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header-icon { color: #FFD700; font-size: 18px; }
  .section-header-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #DC143C;
  }
  .section-divider {
    flex: 1;
    height: 1px;
    background: #f0f0f0;
    margin: 0 20px;
  }

  /* Dish row */
  .dish-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 1px solid #f8f8f8;
  }
  .dish-row:hover { background: #fffaf5; }
  .dish-row:active { background: #fff3e0; }

  .dish-thumb {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f5f5f5;
    border: 2px solid #f0f0f0;
  }
  .dish-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .dish-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
  }

  .dish-details { flex: 1; min-width: 0; }
  .dish-row-name {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dish-row-name-ar {
    font-size: 12px;
    color: #999;
    direction: rtl;
    margin-bottom: 5px;
  }
  .dish-row-desc {
    font-size: 12px;
    color: #888;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dish-price-col {
    flex-shrink: 0;
    text-align: right;
  }
  .dish-row-price {
    font-size: 18px;
    font-weight: 800;
    color: #DC143C;
    white-space: nowrap;
  }
  .dish-row-price .currency {
    font-size: 12px;
    font-weight: 600;
    color: #FFD700;
    margin-left: 2px;
  }
  .price-ask {
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
  }

  /* ── LOADING / EMPTY ── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: #DC143C;
    font-size: 16px;
    font-weight: 600;
  }
  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #FFD700;
    border-top-color: #DC143C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-state h2 { font-size: 20px; color: #1a1a1a; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: #888; }

  /* ── MODAL ── */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal.active { display: flex; }
  .modal-sheet {
    background: #fff;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-img-wrap {
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    position: relative;
    overflow: hidden;
  }
  .modal-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .modal-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
  }
  .modal-close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #DC143C;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-body {
    padding: 16px 24px 32px;
  }
  .modal-section-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #FFD700;
    background: #DC143C;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .modal-title-ar {
    font-size: 15px;
    color: #999;
    direction: rtl;
    margin-bottom: 12px;
  }
  .modal-price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0f0f0;
  }
  .modal-price-val {
    font-size: 30px;
    font-weight: 800;
    color: #DC143C;
  }
  .modal-price-cur {
    font-size: 16px;
    font-weight: 700;
    color: #FFD700;
  }
  .modal-desc {
    font-size: 14px;
    color: #555;
    line-height: 1.8;
  }

  /* ── STICKY BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 540px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    z-index: 99;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  }
  .bottom-bar-left { display: flex; align-items: center; gap: 12px; }
  .bottom-bar-icon {
    width: 40px;
    height: 40px;
    background: #DC143C;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .bottom-bar-text-main {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .bottom-bar-text-sub {
    font-size: 11px;
    color: #aaa;
  }
  .bottom-bar-btn {
    background: #FFD700;
    color: #1a1a1a;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .bottom-bar-btn:hover { background: #FFC200; }

  @media (min-width: 541px) {
    body { box-shadow: 0 0 40px rgba(0,0,0,0.1); }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-logo">
    <span class="nav-logo-icon">👑</span>
    <span class="nav-logo-name">Al Qaysar</span>
    <span class="nav-logo-sub">Restaurant</span>
  </div>
  <button class="nav-menu-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-welcome">Welcome</div>
  <h1 class="hero-title">Our Menu</h1>
  <div class="hero-divider"><span class="hero-divider-icon">✦</span></div>
  <p class="hero-subtitle">Lovingly prepared dishes using the finest ingredients, crafted for your perfect dining experience.</p>
  <div class="hero-search">
    <span class="hero-search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search dishes..." oninput="searchDishes(this.value)">
  </div>
</div>

<!-- CATEGORY ICON BAR -->
<div class="category-bar">
  <div class="category-scroll" id="category-tabs"></div>
</div>

<!-- MENU CONTENT -->
<div class="menu-body">
  <div id="content">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      Loading menu...
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="dish-modal" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-img-wrap">
      <div id="modal-image"></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-section-tag" id="modal-section-tag"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-title-ar" id="modal-title-ar"></div>
      <div class="modal-price-row">
        <span class="modal-price-val" id="modal-price-val"></span>
        <span class="modal-price-cur" id="modal-price-cur"></span>
      </div>
      <p class="modal-desc" id="modal-description"></p>
    </div>
  </div>
</div>

<!-- STICKY BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-bar-left">
    <div class="bottom-bar-icon">🍽️</div>
    <div>
      <div class="bottom-bar-text-main">Al Qaysar Restaurant</div>
      <div class="bottom-bar-text-sub">Open 24 Hours · Duba, Saudi Arabia</div>
    </div>
  </div>
  <a href="tel:+966565041261"><button class="bottom-bar-btn">Call Us</button></a>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCxvxgkzALj5Mip7GHAJBK9SYnNm9qO0KI",
  authDomain: "alqaysar-menu.firebaseapp.com",
  databaseURL: "https://alqaysar-menu-default-rtdb.firebaseio.com",
  projectId: "alqaysar-menu",
  storageBucket: "alqaysar-menu.firebasestorage.app",
  messagingSenderId: "181160036262",
  appId: "1:181160036262:web:d26f2d2504b880807bb167",
  measurementId: "G-3ZTYG4EHMT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SECTION_ORDER = [
  "All","Appetizers","Eidam (Stews)","Grills","Chinese","Sea Food",
  "Saudi Food","Meat","Rice","Karahi Station","BBQ",
  "Pakistani Food","Afghani Food","Salads","Burgers & Sandwiches",
  "Naan & Roti","Beverages","Sweets & Desserts"
];

const CATEGORY_ICONS = {
  "All": "🍽️", "Appetizers": "🥗", "Eidam (Stews)": "🍲",
  "Grills": "🍖", "Chinese": "🥡", "Sea Food": "🦐",
  "Saudi Food": "🍛", "Meat": "🥩", "Rice": "🍚",
  "Karahi Station": "🍳", "BBQ": "🍢", "Pakistani Food": "🫕",
  "Afghani Food": "🫓", "Salads": "🥗", "Burgers & Sandwiches": "🍔",
  "Naan & Roti": "🫓", "Beverages": "🥤", "Sweets & Desserts": "🍰"
};

const CAT_SHORT = {
  "All": "All", "Appetizers": "Starters", "Eidam (Stews)": "Stews",
  "Grills": "Grills", "Chinese": "Chinese", "Sea Food": "Sea Food",
  "Saudi Food": "Saudi", "Meat": "Meat", "Rice": "Rice",
  "Karahi Station": "Karahi", "BBQ": "BBQ", "Pakistani Food": "Pakistani",
  "Afghani Food": "Afghani", "Salads": "Salads", "Burgers & Sandwiches": "Burgers",
  "Naan & Roti": "Naan", "Beverages": "Drinks", "Sweets & Desserts": "Sweets"
};

let allDishes = [];
let currentSection = "All";

db.ref('menu').on('value', snap => {
  const data = snap.val();
  if (!data || !data.dishes) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>Menu not available yet</h2>
        <p>Please check back shortly or ask our staff.</p>
      </div>`;
    return;
  }
  allDishes = Object.values(data.dishes);
  renderCategories();
  renderMenu();
});

function renderCategories() {
  const groups = {};
  allDishes.forEach(d => { if (!groups[d.section]) groups[d.section] = []; groups[d.section].push(d); });
  const sections = ["All", ...SECTION_ORDER.filter(s => s !== "All" && groups[s])];
  document.getElementById('category-tabs').innerHTML = sections.map(s => `
    <div class="cat-item ${s === currentSection ? 'active' : ''}" onclick="filterBySection('${s}')">
      <div class="cat-icon-wrap">${CATEGORY_ICONS[s] || '🍽️'}</div>
      <span class="cat-label">${CAT_SHORT[s] || s}</span>
    </div>
  `).join('');
}

function renderMenu(dishes = null) {
  const list = dishes || (currentSection === "All" ? allDishes : allDishes.filter(d => d.section === currentSection));

  if (!list.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state"><h2>No dishes found</h2><p>Try a different category or search term.</p></div>`;
    return;
  }

  // Group by section
  const grouped = {};
  list.forEach(d => {
    if (!grouped[d.section]) grouped[d.section] = [];
    grouped[d.section].push(d);
  });

  const sectionKeys = currentSection === "All"
    ? SECTION_ORDER.filter(s => s !== "All" && grouped[s])
    : [currentSection];

  document.getElementById('content').innerHTML = sectionKeys.map(sec => `
    <div>
      <div class="section-header">
        <div class="section-header-left">
          <span class="section-header-icon">↓</span>
          <span class="section-header-title">${sec}</span>
        </div>
      </div>
      ${(grouped[sec] || []).map(dish => `
        <div class="dish-row" onclick='openDishModal(${JSON.stringify(dish).replace(/'/g, "&#39;")})'>
          <div class="dish-thumb">
            ${dish.imageUrl
              ? `<img src="${dish.imageUrl}" alt="${dish.en}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                 <div class="dish-thumb-placeholder" style="display:none;">${CATEGORY_ICONS[dish.section] || '🍽️'}</div>`
              : `<div class="dish-thumb-placeholder">${CATEGORY_ICONS[dish.section] || '🍽️'}</div>`
            }
          </div>
          <div class="dish-details">
            <div class="dish-row-name">${dish.en}</div>
            <div class="dish-row-name-ar">${dish.ar}</div>
            <div class="dish-row-desc">${dish.description || 'Ask our staff for details about this dish.'}</div>
          </div>
          <div class="dish-price-col">
            ${dish.price
              ? `<div class="dish-row-price">${dish.price}<span class="currency">ر.س</span></div>`
              : `<div class="price-ask">Ask staff</div>`
            }
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function filterBySection(section) {
  currentSection = section;
  renderCategories();
  renderMenu();
  document.querySelector('.menu-body').scrollIntoView({ behavior: 'smooth' });
}

function searchDishes(query) {
  if (!query.trim()) { renderMenu(); return; }
  const q = query.toLowerCase();
  renderMenu(allDishes.filter(d => d.en.toLowerCase().includes(q) || d.ar.includes(query)));
}

function openDishModal(dish) {
  const imgWrap = document.getElementById('modal-image');
  if (dish.imageUrl) {
    imgWrap.innerHTML = `
      <img src="${dish.imageUrl}" alt="${dish.en}" style="width:100%;height:100%;object-fit:cover;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="modal-img-placeholder" style="display:none;">${CATEGORY_ICONS[dish.section] || '🍽️'}</div>`;
  } else {
    imgWrap.innerHTML = `<div class="modal-img-placeholder">${CATEGORY_ICONS[dish.section] || '🍽️'}</div>`;
  }
  document.getElementById('modal-section-tag').textContent = dish.section;
  document.getElementById('modal-title').textContent = dish.en;
  document.getElementById('modal-title-ar').textContent = dish.ar;
  if (dish.price) {
    document.getElementById('modal-price-val').textContent = dish.price;
    document.getElementById('modal-price-cur').textContent = 'ر.س';
  } else {
    document.getElementById('modal-price-val').textContent = 'Ask staff';
    document.getElementById('modal-price-cur').textContent = '';
  }
  document.getElementById('modal-description').textContent =
    dish.description || `Delicious ${dish.en} from our ${dish.section} menu. Ask our staff for more details.`;
  document.getElementById('dish-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('dish-modal') || event.target.classList.contains('modal-close-btn')) {
    document.getElementById('dish-modal').classList.remove('active');
    document.body.style.overflow = '';
  }
}
</script>
</body>
</html>
