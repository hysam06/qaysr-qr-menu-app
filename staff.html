<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card { background: #fff; border-radius: 16px; border: 1px solid #e5e3dc; padding: 36px 32px; width: 100%; max-width: 360px; }
  .login-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .login-card p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .login-card input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 12px; outline: none; }
  .login-card input:focus { border-color: #333; }
  .login-card button { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .login-card button:active { opacity: 0.85; }
  .login-error { color: #c0392b; font-size: 13px; margin-top: 8px; text-align: center; }

  /* MAIN APP */
  #app { display: none; }
  .top-bar { background: #fff; border-bottom: 1px solid #e5e3dc; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .top-bar h1 { font-size: 17px; font-weight: 600; }
  .top-bar span { font-size: 12px; color: #888; }
  .logout-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; cursor: pointer; }

  .save-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e3dc; display: flex; align-items: center; gap: 10px; }
  .save-btn { flex: 1; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .save-btn:active { opacity: 0.8; }
  .save-btn.saved { background: #27ae60; }
  .count-pill { font-size: 12px; background: #f0ede8; color: #555; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .toast { font-size: 12px; color: #27ae60; padding: 4px 0; text-align: center; min-height: 20px; }

  .search-bar { padding: 10px 16px; background: #f5f4f0; }
  .search-bar input { width: 100%; padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; outline: none; }

  .section-header { padding: 14px 16px 6px; font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.07em; text-transform: uppercase; background: #f5f4f0; }
  .dish-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; background: #fff; border-bottom: 1px solid #f0ede8; cursor: pointer; user-select: none; transition: background 0.1s; }
  .dish-row:hover { background: #faf9f6; }
  .dish-row.on { background: #f0faf5; }
  .checkbox { width: 22px; height: 22px; border-radius: 5px; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .dish-row.on .checkbox { background: #27ae60; border-color: #27ae60; }
  .checkmark { width: 12px; height: 8px; border-left: 2.5px solid #fff; border-bottom: 2.5px solid #fff; transform: rotate(-45deg) translate(1px, -1px); display: none; }
  .dish-row.on .checkmark { display: block; }
  .dish-info { flex: 1; }
  .dish-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .dish-name-ar { font-size: 12px; color: #888; margin-top: 1px; direction: rtl; }
  .dish-price { font-size: 13px; color: #555; white-space: nowrap; }

  .select-all-row { display: flex; gap: 8px; padding: 6px 16px 4px; background: #f5f4f0; }
  .mini-btn { font-size: 11px; color: #555; background: #fff; border: 1px solid #ddd; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
</style>

<!-- LOGIN SCREEN -->
<div id="login-screen">

    <h1>Al Qaysar</h1>
    <p>Staff access — menu manager</p>
    <input type="password" id="pin-input" placeholder="Enter staff PIN" maxlength="10" />
    <button onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="top-bar">
    <div>
      <h1>Menu Manager</h1>
      <span id="today-date"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="save-bar">
    <button class="save-btn" id="save-btn" onclick="saveMenu()">Update guest menu</button>
    <div class="count-pill" id="count-pill">0 dishes on</div>

  <div class="toast" id="toast"></div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search dishes..." oninput="filterDishes(this.value)" />
  </div>
  <div id="menu-list"></div>
</div>

// State
let selected = {};
let currentFilter = "";

function getPublicImagePath(path) {
  if (!path) return "";
  if (/^https?:\/\//i.test(path)) return path;
  return path
    .replace(/^\/+/, "")
    .replace(/^food \//, "food-images/")
    .replace(/^food\//, "food-images/")
    .replace(/^food_compressed\//, "food-images/")
    .replace(/\.png$/i, ".jpg");
}

function doLogin() {
  const pin = document.getElementById('pin-input').value;
  if (pin === STAFF_PIN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadFromFirebase();
    renderDate();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect PIN. Try again.';
  }
}
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-input').value = '';
}

function renderDate() {
  const d = new Date();
  document.getElementById('today-date').textContent = d.toLocaleDateString('en-SA', { weekday:'long', day:'numeric', month:'long' });
}

function loadFromFirebase() {
  db.ref('menu/available').once('value').then(snap => {
    const data = snap.val() || {};
    selected = data;
    renderMenu();
    updateCount();
  });
}

function renderMenu(filter = "") {
  const list = document.getElementById('menu-list');
  list.innerHTML = '';
  MENU.forEach(section => {
    const filtered = section.items.filter(item =>
      !filter ||
      item.en.toLowerCase().includes(filter) ||
      item.ar.includes(filter)
    );
    if (!filtered.length) return;
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-header">${section.section}</div>
      <div class="select-all-row">
        <button class="mini-btn" onclick="selectAll('${section.section}')">All on</button>
        <button class="mini-btn" onclick="deselectAll('${section.section}')">All off</button>
      </div>`;
    filtered.forEach(item => {
      const on = selected[item.id] ? 'on' : '';
      const row = document.createElement('div');
      row.className = `dish-row ${on}`;
      row.dataset.id = item.id;
      row.dataset.section = section.section;
      row.innerHTML = `
        <div class="checkbox"><div class="checkmark"></div></div>
        <div class="dish-info">
          <div class="dish-name">${item.en}</div>
          <div class="dish-name-ar">${item.ar}</div>
        </div>
        <div class="dish-price">${item.price ? item.price + ' ر.س' : ''}</div>`;
      row.onclick = () => toggleRow(row, item.id);
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
}

function toggleRow(row, id) {
  if (selected[id]) {
    delete selected[id];
    row.classList.remove('on');
  } else {
    selected[id] = true;
    row.classList.add('on');
  }
  updateCount();
}

function selectAll(sectionName) {
  const sec = MENU.find(s => s.section === sectionName);
  if (!sec) return;
  sec.items.forEach(item => selected[item.id] = true);
  renderMenu(currentFilter);
  updateCount();
}

function deselectAll(sectionName) {
  const sec = MENU.find(s => s.section === sectionName);
  if (!sec) return;
  sec.items.forEach(item => delete selected[item.id]);
  renderMenu(currentFilter);
  updateCount();
}

function updateCount() {
  const n = Object.keys(selected).length;
  document.getElementById('count-pill').textContent = `${n} dish${n !== 1 ? 'es' : ''} on`;
}

function filterDishes(val) {
  currentFilter = val.toLowerCase().trim();
  renderMenu(currentFilter);
}

function saveMenu() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  // Build full dish data for menu page
  const menuData = {};
  MENU.forEach(section => {
    section.items.forEach(item => {
      if (selected[item.id]) {
        menuData[item.id] = {
          en: item.en,
          ar: item.ar,
          price: item.price,
          section: section.section,
          imageUrl: getPublicImagePath(item.image)
        };
      }
    });
  });

  db.ref('menu').set({
    available: selected,
    dishes: menuData,
    updatedAt: new Date().toISOString()
  }).then(() => {
    btn.textContent = 'Update guest menu';
    btn.disabled = false;
    btn.classList.add('saved');
    const toast = document.getElementById('toast');
    toast.textContent = 'Menu updated — guests can see the changes now.';
    setTimeout(() => { toast.textContent = ''; btn.classList.remove('saved'); }, 3000);
  }).catch(err => {
    btn.textContent = 'Update guest menu';
    btn.disabled = false;
    alert('Error saving. Check your Firebase config.');
    console.error(err);
  });
}
